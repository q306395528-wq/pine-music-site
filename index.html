<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <title>Pine Music · 在线音乐</title>
  <meta name="description" content="Pine Music 在线音乐播放器" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pine Music" />
  <link rel="stylesheet" href="styles.css?v=20260721-26" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">♪</div>
        <strong>Pine Music</strong>
      </div>
      <div class="sidebar-title flush">我的音乐</div>
      <nav class="sub-nav">
        <button id="navAll" class="nav-item active"><span>◉</span>全部歌曲</button>
        <button id="navLiked" class="nav-item"><span>♥</span>我喜欢的音乐</button>
        <label class="nav-item upload-entry" for="filePicker"><span>⇧</span>上传云端音乐</label>
        <input id="filePicker" type="file" accept="audio/mpeg,audio/mp4,audio/wav,audio/ogg,audio/aac,audio/flac,.mp3,.m4a,.wav,.ogg,.aac,.flac" multiple hidden />
      </nav>
    </aside>
    <main class="content">
      <header class="topbar">
        <div class="search-box">
          <span>⌕</span>
          <input id="searchInput" placeholder="搜索歌曲、歌手" />
          <kbd>⌘ K</kbd>
        </div>
        <button class="avatar">P</button>
      </header>
      <section class="hero">
        <div class="hero-copy">
          <span class="eyebrow">PINE MUSIC RADIO</span>
          <h1>听见 · 好时光</h1>
          <p>发现属于你的音乐宇宙，收藏每一段情绪。</p>
          <div class="hero-actions">
            <button class="primary" id="heroPlay">▶ 立即播放</button>
            <button class="ghost" id="shuffleAll">随机播放</button>
          </div>
        </div>
        <div class="hero-art">
          <div class="orb orb-1"></div>
          <div class="orb orb-2"></div>
          <div class="vinyl"><div class="vinyl-center"></div></div>
          <div class="hero-person">♫</div>
        </div>
      </section>
      <section class="section">
        <div class="section-head">
          <div><span class="section-kicker" id="recommendKicker">FOR YOU</span><h2 id="recommendHeading">为你推荐</h2></div>
        </div>
        <div id="recommendGrid" class="recommend-grid"></div>
      </section>
      <section class="section">
        <div class="section-head split">
          <div><span class="section-kicker">GUESS</span><h2>猜你喜欢</h2></div>
          <button id="guessRefresh" class="link-button">换一批 ↻</button>
        </div>
        <div id="guessGrid" class="recommend-grid"></div>
      </section>
    </main>
    <aside class="queue-panel">
      <div class="now-title">正在播放</div>
      <div id="sideCover" class="side-cover cover-purple"><div class="moon">◔</div></div>
      <div class="side-track-row">
        <div><h3 id="sideTitle">夜行列车</h3><p id="sideArtist">Pine Studio</p></div>
        <button id="heartBtn" class="heart">♥</button>
      </div>
      <div class="side-progress">
        <div class="progress-track" id="sideSeek"><span id="sideProgressFill"></span></div>
        <div class="time-row"><span id="sideCurrent">00:00</span><span id="sideDuration">00:00</span></div>
      </div>
      <div class="queue-header">
        <div class="panel-tabs">
          <button id="tabQueue" class="panel-tab active">播放列表 <span id="queueCount">3</span></button>
          <button id="tabLyrics" class="panel-tab">歌词</button>
        </div>
        <button id="clearQueue">清空</button>
      </div>
      <div id="queueList" class="queue-list"></div>
      <div id="lyricsBox" class="lyrics-box" hidden></div>
    </aside>
    <footer class="player">
      <div class="player-song">
        <div id="bottomCover" class="bottom-cover cover-purple"></div>
        <div class="player-song-text"><strong id="bottomTitle">夜行列车</strong><span id="bottomArtist">Pine Studio</span></div>
        <button id="bottomHeart" class="bottom-heart">♡</button>
      </div>
      <div class="player-center">
        <div class="player-buttons">
          <button id="shuffleBtn">⤨</button><button id="prevBtn">|◀</button><button id="playBtn" class="main-play">▶</button><button id="nextBtn">▶|</button><button id="repeatBtn">↻</button>
        </div>
        <div class="bottom-progress-wrap"><span id="currentTime">00:00</span><input id="progressBar" type="range" min="0" max="100" value="0" /><span id="durationTime">00:00</span></div>
      </div>
      <div class="player-extra"><button id="muteBtn">◖</button><input id="volumeBar" type="range" min="0" max="1" step="0.01" value="0.72" /><button id="bottomQueueBtn" aria-label="播放队列">☰</button></div>
    </footer>
  </div>
  <div id="nowPlaying" class="now-playing" hidden>
    <div id="npBg" class="np-bg"></div>
    <button id="npClose" class="np-close" aria-label="关闭全屏">✕</button>
    <div class="np-inner">
      <div class="np-side">
        <div id="npCover" class="np-cover cover-purple"></div>
        <div class="np-meta">
          <div class="np-meta-text">
            <h2 id="npTitle">—</h2>
            <p id="npArtist">—</p>
          </div>
          <button id="npHeart" class="np-heart" aria-label="喜欢">♡</button>
        </div>
        <div class="np-progress">
          <div class="progress-track"><span id="npProgressFill"></span></div>
          <div class="time-row"><span id="npCurrent">00:00</span><span id="npDuration">00:00</span></div>
        </div>
        <div class="np-controls">
          <button id="npPrev" aria-label="上一首">|◀</button>
          <button id="npPlay" class="np-play" aria-label="播放/暂停">▶</button>
          <button id="npNext" aria-label="下一首">▶|</button>
        </div>
        <div class="np-controls-2">
          <button id="npRepeat" aria-label="单曲循环">↻</button>
          <button id="npShuffle" aria-label="随机播放">⤨</button>
          <div class="np-volume">
            <button id="npMute" aria-label="静音">◖</button>
            <input id="npVolume" type="range" min="0" max="1" step="0.01" value="0.72" />
          </div>
        </div>
      </div>
      <div class="np-right">
        <div class="np-tabs">
          <button id="npTabLyrics" class="np-tab active">歌词</button>
          <button id="npTabQueue" class="np-tab">播放列表 <span id="npQueueCount">0</span></button>
        </div>
        <div id="npLyrics" class="np-lyrics"></div>
        <div id="npQueue" class="np-queue" hidden></div>
      </div>
    </div>
  </div>
  <div id="editModal" class="edit-modal" hidden>
    <div class="edit-card">
      <h3>编辑歌曲信息</h3>
      <label class="edit-field">歌名<input id="editTitle" type="text" maxlength="120" placeholder="歌名" /></label>
      <label class="edit-field">歌手<input id="editArtist" type="text" maxlength="120" placeholder="歌手" /></label>
      <p class="edit-hint">保存后会用新名字重新匹配封面。需输入上传密码。</p>
      <div class="edit-actions">
        <button id="editCancel" class="ghost">取消</button>
        <button id="editSave" class="primary">保存</button>
      </div>
    </div>
  </div>
  <audio id="audio"></audio>
  <div id="toast" class="toast"></div>
  <script src="app.js?v=20260721-26"></script>
</body>
</html>
